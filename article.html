<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đang tải bản tin… — Trang Cập Nhật Tin Tức Mỗi Ngày</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --navy:      #8f1f24;   /* dùng làm màu hover đậm */
      --navy-soft: #1b3a57;
      --accent:    #b7282e;   /* đỏ son chủ đạo */
      --accent-2:  #2f6f9f;   /* xanh cho link/thứ Bảy */
      --ink:       #211f1c;
      --muted:     #6d675a;
      --line:      #e0d9c8;
      --bg:        #f5f1e8;
      --card:      #fffdf7;
      --shadow:    0 4px 18px rgba(60, 45, 20, 0.08);
      --radius:    12px;
    }
    [data-theme="dark"] {
      --ink:   #ece7db;
      --muted: #a39c8b;
      --line:  #3a352c;
      --bg:    #171512;
      --card:  #201d18;
      --accent: #e05a5f;
      --navy:  #c94a50;
      --shadow: 0 4px 18px rgba(0,0,0,0.5);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Be Vietnam Pro", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Thanh đầu trang (kiểu nhật báo) ---- */
    .topbar {
      background: var(--card);
      border-bottom: 3px double var(--ink);
      padding: 14px 0;
    }
    .topbar .wrap {
      max-width: 860px; margin: 0 auto; padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--accent); text-decoration: none; font-weight: 700; font-size: 14.5px;
      background: transparent; border: 1px solid var(--accent);
      padding: 7px 16px; border-radius: 999px; transition: all .15s;
    }
    .back-link:hover { background: var(--accent); color: #fff; }
    .topbar .brand { font-size: 14px; color: var(--muted); font-weight: 600; }
    #theme-toggle {
      font-family: inherit; font-size: 13px; font-weight: 600;
      color: var(--ink); background: transparent;
      border: 1px solid var(--line); border-radius: 999px;
      padding: 5px 12px; cursor: pointer; white-space: nowrap;
    }
    #theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* ---- Khu vực bài viết ---- */
    main { max-width: 860px; margin: 28px auto 60px; padding: 0 20px; }
    .article-date {
      display: inline-block; font-size: 13px; font-weight: 700; color: var(--accent);
      background: transparent; border: 1px solid var(--accent);
      padding: 5px 14px; border-radius: 999px; margin-bottom: 16px;
    }
    .article-shell {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px clamp(20px, 4vw, 48px);
      overflow-wrap: break-word;
    }

    /* ---- Style nội dung (đồng bộ với index.html) ---- */
    .article-shell h2 {
      font-size: clamp(21px, 3vw, 28px); color: var(--ink);
      font-weight: 800; line-height: 1.35; margin: 26px 0 10px;
      padding-left: 14px; border-left: 5px solid var(--accent);
    }
    .article-shell h2:first-child { margin-top: 0; }
    .article-shell h3 { font-size: 17px; color: var(--ink); font-weight: 700; margin: 22px 0 8px; }
    .article-shell h3::before { content: "■ "; color: var(--accent); font-size: 12px; vertical-align: 2px; }
    .article-shell p { margin: 10px 0; color: var(--ink); }
    .article-shell a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; word-break: break-all; }
    .article-shell a:hover { border-bottom-color: var(--accent); }
    .article-shell ul, .article-shell ol { margin: 10px 0 10px 22px; }
    .article-shell img { max-width: 100%; height: auto; border-radius: 12px; margin: 14px 0; }
    .article-shell svg { max-width: 100%; height: auto; display: block; margin: 16px 0; }

    .article-shell table {
      width: 100%; border-collapse: collapse; margin: 16px 0;
      display: block; overflow-x: auto;     /* bảng dài cuộn ngang thay vì tràn viền */
    }
    .article-shell th, .article-shell td {
      border: 1px solid var(--line); padding: 10px 12px; text-align: left;
      white-space: nowrap;
    }
    .article-shell th { background: rgba(183, 40, 46, 0.07); font-weight: 700; }

    .news-meta {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      margin: 4px 0 18px; padding-bottom: 18px; border-bottom: 1px dashed var(--line);
    }
    .news-tag {
      font-size: 12px; font-weight: 600; color: #fff; background: var(--accent);
      padding: 4px 12px; border-radius: 999px;
    }
    .news-time { font-size: 13px; color: var(--muted); }

    .state { text-align: center; padding: 48px 20px; color: var(--muted); }
    .spinner {
      width: 34px; height: 34px; margin: 0 auto 14px;
      border: 3px solid var(--line); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center; color: var(--muted); font-size: 13px; padding: 24px 20px 40px;
    }

    #to-top {
      position: fixed; right: 18px; bottom: 18px; z-index: 50;
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--accent); color: #fff; border: none;
      font-size: 22px; line-height: 1; cursor: pointer;
      box-shadow: var(--shadow);
      opacity: 0; visibility: hidden; transform: translateY(10px);
      transition: opacity .25s ease, transform .25s ease, visibility .25s;
    }
    #to-top.show { opacity: 1; visibility: visible; transform: translateY(0); }
    #to-top:hover { background: var(--navy); }

    @media (max-width: 600px) {
      .article-shell { padding: 22px 16px; }
      .topbar .brand { display: none; }
      .article-shell th, .article-shell td { padding: 8px 10px; font-size: 14px; }
      #to-top { right: 14px; bottom: 14px; }
    }

    /* Tự động tối theo hệ thống (khi chưa chọn thủ công) */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --ink:   #ece7db;
        --muted: #a39c8b;
        --line:  #3a352c;
        --bg:    #171512;
        --card:  #201d18;
        --accent: #e05a5f;
        --navy:  #c94a50;
        --shadow: 0 4px 18px rgba(0,0,0,0.5);
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="wrap">
      <a class="back-link" href="index.html">← Về trang chủ</a>
      <span class="brand">Phúc Hưng · 日本不動産・経済情報</span>
      <button id="theme-toggle" aria-label="Đổi giao diện sáng/tối">🌙 Tối</button>
    </div>
  </header>

  <main>
    <div id="article-date-box"></div>
    <article class="article-shell" id="article">
      <div class="state"><div class="spinner"></div>Đang tải bản tin…</div>
    </article>
  </main>

  <footer>© <span id="year"></span> — <strong>Phúc Hưng</strong> · Thông tin thị trường bất động sản Nhật Bản</footer>

  <button id="to-top" aria-label="Lên đầu trang" title="Lên đầu trang">↑</button>

  <script>
    /* Giao diện sáng/tối — tự động theo máy + nút bật tắt */
    (function () {
      const root = document.documentElement;
      const btn = document.getElementById("theme-toggle");
      const saved = localStorage.getItem("theme");
      if (saved === "dark" || saved === "light") root.setAttribute("data-theme", saved);
      function isDark() {
        const attr = root.getAttribute("data-theme");
        if (attr) return attr === "dark";
        return window.matchMedia("(prefers-color-scheme: dark)").matches;
      }
      function refresh() { btn.textContent = isDark() ? "☀️ Sáng" : "🌙 Tối"; }
      btn.addEventListener("click", () => {
        const next = isDark() ? "light" : "dark";
        root.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
        refresh();
      });
      refresh();
    })();

    document.getElementById("year").textContent = new Date().getFullYear();

    (function(){
      const toTop = document.getElementById("to-top");
      if (!toTop) return;
      toTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
      window.addEventListener("scroll", () => {
        toTop.classList.toggle("show", window.scrollY > 400);
      }, { passive: true });
    })();

    /** Lấy tham số ?date=YYYY-MM-DD */
    function getDateParam() {
      const v = new URLSearchParams(location.search).get("date") || "";
      return /^\d{4}-\d{2}-\d{2}$/.test(v) ? v : null;
    }
    function toDisplayDate(iso) {
      const [y, m, d] = iso.split("-");
      return `${d}/${m}/${y}`;
    }

    async function loadArticle() {
      const article = document.getElementById("article");
      const dateBox = document.getElementById("article-date-box");
      const iso = getDateParam();

      if (!iso) {
        article.innerHTML = `<div class="state">⚠️ Thiếu hoặc sai tham số ngày. <a href="index.html">Về trang chủ</a></div>`;
        return;
      }

      dateBox.innerHTML = `<span class="article-date">📅 Bản tin ngày ${toDisplayDate(iso)}</span>`;

      try {
        const res = await fetch(`archive/${iso}.html`, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const html = await res.text();
        article.innerHTML = html;
        document.title = `Bản tin ${toDisplayDate(iso)} — Trang Cập Nhật Tin Tức Mỗi Ngày`;
      } catch (err) {
        article.innerHTML = `<div class="state">⚠️ Không tải được bản tin ngày <strong>${toDisplayDate(iso)}</strong>.<br><a href="index.html">Về trang chủ</a></div>`;
        console.error("Lỗi tải bài:", err);
      }
    }

    document.addEventListener("DOMContentLoaded", loadArticle);
  </script>
</body>
</html>
